<!DOCTYPE html>

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link rel="stylesheet" href="index.css">

    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
    </div>

    <!-- Navigation -->
    <nav id="main-nav" class="nav hidden">
        <div class="nav-inner">
            <a href="#/" class="nav-logo">
                <span class="material-icons-round logo-icon">visibility</span>

            <div class="nav-links">

                </a>

                </a>
            </div>
            <button id="logout-btn" class="btn btn-ghost">
                <span class="material-icons-round">logout</span>
                Chiqish
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main id="app-container"></main>

    <!-- Toast Notifications -->
    <div id="toast-container"></div>

    <!-- App Core (must load first) -->
    <script src="app.js"></script>
    <!-- Page Scripts -->
    <script src="pages/auth.js"></script>
    <script src="pages/dashboard.js"></script>
    <script src="pages/profile.js"></script>
    <script src="pages/camera.js"></script>
